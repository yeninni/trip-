<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>전남 ECO 여행</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1f1b;
  --ink2:#3d4a3f;
  --ink3:#6b7c6d;
  --ink4:#9aaa9c;
  --paper:#f5f2ec;
  --paper2:#ede9e0;
  --paper3:#e4e0d5;
  --moss:#2d5a3d;
  --moss2:#3d7a52;
  --leaf:#52a06a;
  --leaf2:#7bc491;
  --mint:#c8e8d0;
  --sage:#8fad95;
  --earth:#8b6f47;
  --earth2:#b89060;
  --sky:#e8f4f0;
  --r:16px;
  --r2:24px;
  --r3:32px;
}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--paper);
  color:var(--ink);
  height:100dvh;
  overflow:hidden;
  position:relative;
}
/* ── MAP ── */
#map-wrap{position:fixed;inset:0;z-index:0}
#map{width:100%;height:100%}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{margin-bottom:180px!important;margin-right:16px!important}
.leaflet-control-zoom a{
  background:rgba(245,242,236,.92)!important;
  border:none!important;
  color:var(--ink)!important;
  font-size:16px!important;
  width:36px!important;height:36px!important;
  line-height:36px!important;
  border-radius:12px!important;
  box-shadow:0 2px 12px rgba(0,0,0,.1)!important;
}

/* ── TOP ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  padding:14px 16px 0;
  display:flex;align-items:center;gap:10px;
}
.brand{
  display:flex;align-items:center;gap:10px;
  background:rgba(245,242,236,.94);
  backdrop-filter:blur(16px) saturate(1.4);
  padding:9px 16px 9px 10px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 2px 20px rgba(45,90,61,.14);
  flex-shrink:0;text-decoration:none;
}
.brand-mark{
  width:30px;height:30px;border-radius:10px;
  background:linear-gradient(145deg,var(--moss2),var(--moss));
  display:flex;align-items:center;justify-content:center;
}
.brand-mark svg{width:16px;height:16px;fill:#fff}
.brand-name{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700;color:var(--ink)}
.brand-name span{color:var(--leaf);font-size:11px;display:block;font-family:'Noto Sans KR',sans-serif;font-weight:400;margin-top:-1px}

.search-pill{
  flex:1;display:flex;align-items:center;gap:10px;
  background:rgba(245,242,236,.94);
  backdrop-filter:blur(16px) saturate(1.4);
  padding:11px 16px;border-radius:40px;
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 2px 20px rgba(45,90,61,.14);
  cursor:pointer;
  transition:box-shadow .2s,border-color .2s;
}
.search-pill:hover{box-shadow:0 4px 28px rgba(45,90,61,.2);border-color:var(--leaf2)}
.sp-icon{color:var(--ink3);font-size:14px}
.sp-main{flex:1;font-size:13px;color:var(--ink3)}
.sp-main b{color:var(--ink);font-weight:600}
.sp-sep{width:1px;height:18px;background:var(--paper3)}
.sp-date{font-size:12px;font-weight:600;color:var(--leaf);white-space:nowrap}

.btn-setting{
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(245,242,236,.94);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 2px 20px rgba(45,90,61,.14);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .15s;
}
.btn-setting:hover{transform:rotate(45deg)}
.btn-setting svg{width:18px;height:18px;stroke:var(--ink2);fill:none;stroke-width:1.8}

/* ── PILLS ── */
.pill-row{
  position:fixed;top:72px;left:0;right:0;z-index:200;
  padding:10px 16px;
  display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;
}
.pill-row::-webkit-scrollbar{display:none}
.eco-pill{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:40px;
  background:rgba(245,242,236,.9);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.6);
  font-size:12px;font-weight:500;color:var(--ink2);
  cursor:pointer;transition:all .2s;
  box-shadow:0 1px 10px rgba(0,0,0,.07);
  white-space:nowrap;
}
.eco-pill .p-dot{width:6px;height:6px;border-radius:50%;background:var(--ink4)}
.eco-pill:hover{border-color:var(--leaf);color:var(--moss)}
.eco-pill.on{
  background:var(--moss);border-color:var(--moss);color:#fff;
  box-shadow:0 4px 16px rgba(45,90,61,.35);
}
.eco-pill.on .p-dot{background:var(--leaf2)}

/* ── SHEET ── */
.sheet-bg{
  position:fixed;inset:0;z-index:400;
  background:transparent;pointer-events:none;
  transition:background .35s;
}
.sheet-bg.open{background:rgba(26,31,27,.35);pointer-events:all}

.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:var(--paper);
  border-radius:28px 28px 0 0;
  box-shadow:0 -8px 60px rgba(45,90,61,.18);
  transform:translateY(calc(100% - 96px));
  transition:transform .42s cubic-bezier(.32,.72,0,1);
  max-height:88dvh;
  display:flex;flex-direction:column;
  border-top:1px solid rgba(255,255,255,.8);
}
.sheet.peek{transform:translateY(calc(100% - 164px))}
.sheet.half{transform:translateY(38%)}
.sheet.full{transform:translateY(0)}

.sheet-drag{padding:14px 0 4px;cursor:grab;flex-shrink:0;text-align:center}
.sheet-drag-bar{display:inline-block;width:40px;height:4px;border-radius:2px;background:var(--paper3)}

/* Peek bar */
.peek-bar{
  padding:0 20px 16px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
}
.peek-region-dot{
  width:48px;height:48px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  background:var(--mint);
}
.peek-text{flex:1}
.peek-name{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700}
.peek-meta{font-size:12px;color:var(--ink3);margin-top:3px}
.peek-meta b{color:var(--leaf);font-weight:600}
.peek-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.peek-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:999px;
  background:var(--paper2);color:var(--ink2);
  font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.75);
}
.peek-chip-btn{
  border:none;cursor:pointer;
  background:rgba(82,160,106,.14);color:var(--moss);
}
.peek-chevron{color:var(--ink4);font-size:22px;transition:transform .3s}
.sheet.half .peek-chevron,.sheet.full .peek-chevron{transform:rotate(90deg)}

/* Tabs */
.tabs{
  display:flex;padding:0 20px;
  border-bottom:1px solid var(--paper3);
  flex-shrink:0;display:none;
}
.t-tab{
  padding:12px 16px;font-size:13px;font-weight:500;
  color:var(--ink3);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .18s;white-space:nowrap;
}
.t-tab.on{color:var(--moss);border-bottom-color:var(--moss)}

.sheet-body{overflow-y:auto;flex:1;overscroll-behavior:contain}

/* ── SUMMARY BAND ── */
.sum-band{
  display:flex;gap:0;
  padding:20px 20px 4px;
}
.sum-cell{
  flex:1;text-align:center;
  padding:14px 8px;
  background:var(--paper2);border-radius:14px;margin:0 4px;
}
.sum-cell:first-child{margin-left:0}.sum-cell:last-child{margin-right:0}
.sum-val{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--moss)}
.sum-key{font-size:10px;color:var(--ink3);margin-top:3px;letter-spacing:.03em}

/* ── TIMELINE ── */
.tl{padding:20px 20px 4px}
.tl-node{display:flex;gap:14px;padding-bottom:0}
.tl-spine{display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0}
.tl-orb{
  width:40px;height:40px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;z-index:1;
  border:1.5px solid rgba(255,255,255,.7);
}
.tl-vein{flex:1;width:2px;background:var(--paper3);margin:6px 0;min-height:16px}
.tl-card{flex:1;padding:4px 0 22px}
.tl-card-btn{
  width:100%;text-align:left;border:none;cursor:pointer;
  background:rgba(255,255,255,.58);border-radius:18px;
  padding:14px 16px;transition:transform .18s,box-shadow .18s,background .18s;
  box-shadow:0 1px 0 rgba(255,255,255,.55) inset;
}
.tl-card-btn:hover{
  transform:translateY(-1px);background:#fff;
  box-shadow:0 8px 22px rgba(45,90,61,.08);
}
.tl-when{font-size:11px;font-weight:600;color:var(--ink4);letter-spacing:.06em;text-transform:uppercase}
.tl-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;margin-top:3px}
.tl-body{font-size:12px;color:var(--ink3);margin-top:4px;line-height:1.55}
.tl-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.tl-cta{margin-top:10px;font-size:11px;color:var(--moss);font-weight:700}
.tl-tag{
  font-size:11px;padding:3px 10px;border-radius:20px;
  background:var(--paper3);color:var(--ink3);font-weight:500;
}
.tl-transit{
  display:flex;align-items:center;gap:8px;
  padding:0 0 16px 54px;
  font-size:11px;color:var(--ink4);font-weight:500;
}
.tl-transit-line{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--paper3) 0,var(--paper3) 5px,transparent 5px,transparent 10px)}

/* ── CROWD ── */
.crowd-list{padding:20px}
.crowd-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:20px;
  background:var(--paper2);margin-bottom:10px;
  cursor:pointer;
  border:1.5px solid transparent;
  transition:all .2s;
}
.crowd-row:hover{background:#fff;border-color:var(--leaf2)}
.crowd-row.on{background:#fff;border-color:var(--moss);box-shadow:0 4px 20px rgba(45,90,61,.1)}
.crowd-emoji{
  width:48px;height:48px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.crowd-body{flex:1;min-width:0}
.crowd-row-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.crowd-rname{font-weight:600;font-size:14px}
.crowd-rsub{font-size:11px;color:var(--ink4);margin-top:2px}
.crowd-rank{
  font-size:10px;font-weight:700;color:var(--moss);
  padding:4px 8px;border-radius:999px;background:rgba(82,160,106,.14);
  white-space:nowrap;
}
.crowd-bar-wrap{margin-top:10px;height:8px;border-radius:999px;background:var(--paper3);overflow:hidden}
.crowd-bar{height:100%;border-radius:999px;transition:width .6s ease}
.crowd-meter{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:8px}
.crowd-seg{height:5px;border-radius:999px;background:rgba(156,170,156,.28)}
.crowd-seg.on{background:var(--moss)}
.crowd-note{font-size:11px;color:var(--ink3);margin-top:8px}
.crowd-right{text-align:right;flex-shrink:0}
.crowd-num{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700}
.crowd-badge{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:4px;font-weight:600;
}
.lv-low{background:#dcfce7;color:#14532d}
.lv-mid{background:#fef9c3;color:#713f12}
.lv-high{background:#fee2e2;color:#7f1d1d}

/* ── LOCKER ── */
.locker-list{padding:20px;display:flex;flex-direction:column;gap:10px}
.locker-card{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px;border-radius:20px;background:var(--paper2);
}
.locker-ico{
  width:44px;height:44px;border-radius:14px;
  background:var(--sky);display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;
}
.lk-name{font-size:14px;font-weight:600}
.lk-addr{font-size:11px;color:var(--ink4);margin-top:3px}
.lk-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.lk-dot{width:7px;height:7px;border-radius:50%}
.lk-dot.ok{background:var(--leaf)}
.lk-dot.full{background:#ef4444}
.lk-txt{font-size:12px;font-weight:600}
.lk-prog{margin-top:7px;height:4px;border-radius:2px;background:var(--paper3);overflow:hidden}
.lk-prog-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* ── SEARCH PANEL ── */
.sp-panel{
  position:fixed;top:0;left:0;right:0;z-index:700;
  background:var(--paper);
  border-radius:0 0 28px 28px;
  padding:20px 20px 24px;
  transform:translateY(-110%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  box-shadow:0 8px 40px rgba(45,90,61,.2);
  border-bottom:1px solid var(--paper3);
}
.sp-panel.open{transform:translateY(0)}
.sp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sp-title{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700}
.sp-close{
  width:32px;height:32px;border-radius:10px;border:none;
  background:var(--paper3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--ink2);
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.f-field{}
.f-lbl{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
.f-ctrl{
  width:100%;padding:12px 14px;
  border-radius:14px;border:1.5px solid var(--paper3);
  background:var(--paper2);font-family:inherit;font-size:13px;
  color:var(--ink);appearance:none;transition:border-color .2s,background .2s;
}
.f-ctrl:focus{outline:none;border-color:var(--leaf);background:#fff}
.date-presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.date-chip{
  border:none;cursor:pointer;
  border-radius:999px;padding:8px 12px;
  background:var(--paper2);color:var(--ink2);
  font-family:inherit;font-size:12px;font-weight:600;
  transition:background .18s,color .18s,transform .18s,box-shadow .18s;
  border:1px solid rgba(255,255,255,.75);
}
.date-chip:hover{transform:translateY(-1px);background:#fff}
.date-chip.on{
  background:var(--moss);color:#fff;
  box-shadow:0 8px 20px rgba(45,90,61,.2);
}
.btn-run{
  width:100%;padding:15px;border-radius:18px;border:none;
  background:linear-gradient(145deg,var(--moss2),var(--moss));
  color:#fff;font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;
  cursor:pointer;margin-top:4px;letter-spacing:.03em;
  transition:opacity .2s,transform .15s;
  box-shadow:0 6px 24px rgba(45,90,61,.28);
}
.btn-run:hover{opacity:.92;transform:translateY(-1px)}
.btn-run:disabled{opacity:.5;transform:none;cursor:not-allowed}

/* ── STATES ── */
.empty{padding:48px 20px;text-align:center}
.empty-ico{font-size:48px;margin-bottom:14px}
.empty-t{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;color:var(--ink2)}
.empty-s{font-size:13px;color:var(--ink3);margin-top:6px;line-height:1.6}
.landing{padding:22px 20px 26px}
.landing-hero{
  padding:18px;border-radius:22px;
  background:linear-gradient(155deg,rgba(232,244,240,.95),rgba(245,242,236,.9));
  border:1px solid rgba(255,255,255,.8);
  box-shadow:0 8px 24px rgba(45,90,61,.08);
}
.landing-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:var(--moss);
  background:rgba(82,160,106,.14);padding:6px 10px;border-radius:999px;
}
.landing-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;line-height:1.35;margin-top:12px}
.landing-copy{font-size:13px;color:var(--ink3);line-height:1.65;margin-top:10px}
.landing-cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.landing-btn{
  border:none;cursor:pointer;
  padding:12px 14px;border-radius:16px;
  font-family:inherit;font-size:13px;font-weight:700;
  transition:transform .18s,box-shadow .18s,background .18s;
}
.landing-btn.primary{
  background:linear-gradient(145deg,var(--moss2),var(--moss));color:#fff;
  box-shadow:0 8px 22px rgba(45,90,61,.2);
}
.landing-btn.secondary{background:#fff;color:var(--moss);border:1px solid var(--paper3)}
.landing-btn:hover{transform:translateY(-1px)}
.landing-section-title{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:20px;margin-bottom:12px;font-size:12px;font-weight:700;color:var(--ink3);
}
.landing-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.region-card{
  border:none;cursor:pointer;text-align:left;
  background:rgba(255,255,255,.72);border-radius:18px;
  padding:14px;border:1px solid rgba(255,255,255,.78);
  box-shadow:0 8px 20px rgba(45,90,61,.06);
  transition:transform .18s,box-shadow .18s,border-color .18s;
}
.region-card:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(45,90,61,.1)}
.region-card.on{border-color:var(--leaf);background:#fff}
.region-card-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.region-card-emoji{
  width:42px;height:42px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.region-card-name{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
.region-card-sub{font-size:11px;color:var(--ink4);margin-top:3px}
.region-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.region-card-stat{
  font-size:10px;font-weight:700;color:var(--ink2);
  padding:5px 8px;border-radius:999px;background:var(--paper2);
}
.access-card{
  width:calc(100% - 40px);margin:6px 20px 0;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  border:none;cursor:pointer;text-align:left;
  border-radius:20px;padding:14px 16px;
  background:linear-gradient(145deg,rgba(209,250,229,.7),rgba(245,242,236,.95));
  border:1px solid rgba(255,255,255,.82);
}
.access-kicker{font-size:11px;font-weight:700;color:var(--leaf)}
.access-title{font-size:14px;font-weight:700;color:var(--ink);margin-top:2px}
.access-copy{font-size:12px;color:var(--ink3);margin-top:4px}
.access-arrow{font-size:20px;color:var(--moss)}
.skel{border-radius:14px;background:linear-gradient(90deg,var(--paper2) 25%,var(--paper3) 50%,var(--paper2) 75%);background-size:200%;animation:sk 1.2s infinite}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(26,31,27,.88);backdrop-filter:blur(12px);
  color:#fff;padding:10px 20px;border-radius:40px;
  font-size:12px;font-weight:500;z-index:999;
  opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;
  border:1px solid rgba(255,255,255,.12);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── API MODAL ── */
.modal-wrap{
  position:fixed;inset:0;z-index:800;
  background:rgba(26,31,27,.5);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-wrap.open{opacity:1;pointer-events:all}
.modal{
  width:100%;background:var(--paper);border-radius:var(--r2);
  padding:24px;max-width:480px;margin:0 auto;
  transform:translateY(16px);transition:transform .3s;

function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([34.87,126.99],8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  plotOverview();
}

function clearMap(){
  markers.forEach(m=>map.removeLayer(m));
  lines.forEach(l=>map.removeLayer(l));
  markers=[];lines=[];courseMarkers=[];
}

function plotOverview(focusKey=null){
  clearMap();
  Object.entries(RG).forEach(([key,ri])=>{
    const ic=L.divIcon({
      html:`<div class="eco-pin" style="background:${ri.bg};font-size:17px">${ri.e}</div>`,
      iconSize:[38,38],iconAnchor:[19,19],className:'',
    });
    const mk=L.marker([ri.lat,ri.lng],{icon:ic}).addTo(map);
    mk.bindPopup(`<b style="font-family:'Noto Serif KR',serif;font-size:14px">${ri.n}</b><br><small style="color:#666">${ri.sub}</small>`);
    mk.on('click',()=>previewRegion(key));
    markers.push(mk);
    if(key===focusKey)mk.openPopup();
  });
  if(focusKey&&RG[focusKey])map.flyTo([RG[focusKey].lat,RG[focusKey].lng],10,{duration:.8});
  else map.flyTo([34.87,126.99],8,{duration:.8});
}

function plotCourse(spots){
  clearMap();
  const lls=[];
  spots.forEach(s=>{
    const ll=[s.lat,s.lng];
    lls.push(ll);
    const ic=L.divIcon({
      html:`<div class="eco-pin" style="background:${s.bg};font-size:17px">${s.e}</div>`,
      iconSize:[38,38],iconAnchor:[19,19],className:'',
    });
    const mk=L.marker(ll,{icon:ic}).addTo(map);
    mk.bindPopup(`<b style="font-family:'Noto Serif KR',serif;font-size:14px">${s.n}</b><br><small style="color:#666">${s.d}</small>`);
    markers.push(mk);
    courseMarkers.push(mk);
  });
  if(lls.length>1){
    const pl=L.polyline(lls,{color:'#52a06a',weight:3,dashArray:'9 7',opacity:.7}).addTo(map);
    lines.push(pl);
    map.fitBounds(pl.getBounds(),{paddingTopLeft:[20,130],paddingBottomRight:[24,220]});
  }else if(lls.length===1){
    map.flyTo(lls[0],13,{duration:.8});
  }
}

function openSP(){document.getElementById('spPanel').classList.add('open')}
function closeSP(){document.getElementById('spPanel').classList.remove('open')}

function formatInputDate(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function formatDateLabel(dateStr){
  return new Date(dateStr).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
}

function getPresetDate(kind){
  const today=new Date();
  today.setHours(12,0,0,0);
  if(kind==='today')return today;
  const saturday=new Date(today);
  const offset=(6-today.getDay()+7)%7;
  saturday.setDate(today.getDate()+offset);
  if(kind==='weekend')return saturday;
  const nextSaturday=new Date(saturday);
  nextSaturday.setDate(saturday.getDate()+7);
  return nextSaturday;
}

function syncDatePreset(){
  const current=document.getElementById('tdate').value;
  const values={
    today:formatInputDate(getPresetDate('today')),
    weekend:formatInputDate(getPresetDate('weekend')),
    nextWeekend:formatInputDate(getPresetDate('nextWeekend')),
  };
  document.querySelectorAll('.date-chip').forEach(btn=>{
    btn.classList.toggle('on',values[btn.dataset.preset]===current);
  });
}

function applyDatePreset(kind){
  document.getElementById('tdate').value=formatInputDate(getPresetDate(kind));
  syncDatePreset();
}

function getCrowdEntry(key){
  return crowdD.find(r=>r.key===key)||{key,...RG[key],...MC[key]};
}

function getLockerSummary(key){
  return (LOCKERS[key]||[]).reduce((acc,item)=>{
    acc.locations+=1;
    acc.avail+=item.avail;
    acc.total+=item.total;
    return acc;
  },{locations:0,avail:0,total:0});
}

function getBestRegionKey(){
  const source=(crowdD.length?crowdD:Object.keys(RG).map(key=>getCrowdEntry(key))).slice();
  source.sort((a,b)=>(a.visitors||0)-(b.visitors||0));
  return source[0]?.key||'damyang';
}

async function runSearch(){
  const date=document.getElementById('tdate').value;
  if(!date){toast('📅 날짜를 선택해 주세요');return;}
  const btn=document.getElementById('btnRun');
  btn.disabled=true;
  btn.textContent='잠시만요…';
  closeSP();

  document.getElementById('spDate').textContent=formatDateLabel(date);
  setLoading();
  crowdD=await fetchCrowd(date);

  const sel=document.getElementById('rsel').value;
  const rk=sel||crowdD.find(r=>r.level==='low')?.key||crowdD[0]?.key;
  curRegion=rk;
  courseD=COURSES[rk]||[];
  lockerD=LOCKERS[rk]||[];

  document.getElementById('spMain').innerHTML=`<b>${RG[rk].n}</b> · ${RG[rk].sub}`;
  document.getElementById('tabs').style.display='flex';
  setPillOn(rk);
  setActiveTab('course');
  updatePeek(rk);
  render();
  plotCourse(courseD);

  btn.disabled=false;

}

async function fetchCrowd(date){
  if(!API_KEY)return mockCrowd();
  const ym=date.replace(/-/g,'').slice(0,6);
  const url=`https://apis.data.go.kr/B551011/TourismResourceStatsService/getPredictVisitorsInfo`
    +`?serviceKey=${encodeURIComponent(API_KEY)}&YM=${ym}&SIDO=전라남도&MobileOS=ETC&MobileApp=EcoTravel&_type=json&numOfRows=20`;
  try{
    const r=await fetch(url);
    const d=await r.json();
    const items=d?.response?.body?.items?.item;
    if(!items)throw 0;
    toast('✅ 혼잡도 API 연동');
    return parseItems(items);
  }catch{
    toast('⚠️ 샘플 데이터 사용');
    return mockCrowd();
  }
}

function parseItems(items){
  const arr=Array.isArray(items)?items:[items];
  const mapped={};
  arr.forEach(it=>{
    const key=nm2k(it.SIGNGU_NM||'');
    if(!key)return;
    const visitors=parseInt(it.PREDICT_CNT||0,10);
    mapped[key]={key,...RG[key],level:visitors>2000?'high':visitors>1000?'mid':'low',visitors};
  });
  return Object.keys(RG).map(key=>mapped[key]||{key,...RG[key],...MC[key]});
}

function mockCrowd(){
  return Object.keys(RG).map(key=>({key,...RG[key],...MC[key]}));
}

function nm2k(nm){
  if(nm.includes('여수'))return'yeosu';
  if(nm.includes('순천'))return'suncheon';
  if(nm.includes('담양'))return'damyang';
  if(nm.includes('목포'))return'mokpo';
  if(nm.includes('보성'))return'boseong';
  if(nm.includes('강진'))return'gangjin';
  return null;
}

function render(){
  if(!crowdD.length&&!courseD.length){
    renderLandingState();
    return;
  }
  const body=document.getElementById('sheetBody');
  if(curTab==='course')body.innerHTML=renderCourse();
  else if(curTab==='crowd')body.innerHTML=renderCrowd();
  else body.innerHTML=renderLocker();
}

  if(!courseD.length)return`<div class="empty"><div class="empty-ico">🗺️</div><div class="empty-t">코스 없음</div></div>`;

  const hrs=Math.floor(courseD.length*1.5);
  const crowd=getCrowdEntry(rk);

  const lv=crowd.level||'low';
  const lvC=lv==='low'?'#14532d':lv==='mid'?'#713f12':'#7f1d1d';
  const lvBg=lv==='low'?'#dcfce7':lv==='mid'?'#fef9c3':'#fee2e2';
  let html=`<div class="sum-band">
    <div class="sum-cell"><div class="sum-val">${dist}</div><div class="sum-key">총 거리 km</div></div>
    <div class="sum-cell"><div class="sum-val">${hrs}h</div><div class="sum-key">예상 시간</div></div>
    <div class="sum-cell"><div class="sum-val">${courseD.length}</div><div class="sum-key">방문 코스</div></div>
    <div class="sum-cell"><div class="sum-val" style="font-size:13px;color:${lvC};background:${lvBg};padding:4px 8px;border-radius:20px">${lvLbl(lv)}</div><div class="sum-key">혼잡 수준</div></div>
  </div>
  <button class="access-card" onclick="openLockerTab()">
    <div>
      <div class="access-kicker">보관함 빠른 이동</div>
      <div class="access-title">${locker.locations}개 보관함 · 총 ${locker.avail}/${locker.total}칸 여유</div>
      <div class="access-copy">코스 중간에 짐을 맡길 수 있는 곳을 바로 확인해보세요</div>
    </div>
    <div class="access-arrow">›</div>
  </button>
  <div class="tl">`;
  courseD.forEach((item,i)=>{
    if(i>0){
      const minutes=Math.floor(Math.random()*14)+7;
      html+=`<div class="tl-transit"><span>🚶 도보 이동</span><div class="tl-transit-line"></div><span>약 ${minutes}분</span></div>`;
    }
    html+=`<div class="tl-node">
      <div class="tl-spine">
        <div class="tl-orb" style="background:${item.bg}">${item.e}</div>
        ${i<courseD.length-1?'<div class="tl-vein"></div>':''}
      </div>
      <div class="tl-card">
        <button class="tl-card-btn" onclick="focusSpot(${i})">
          <div class="tl-when">${item.when}</div>
          <div class="tl-title">${item.n}</div>
          <div class="tl-body">${item.d}</div>
          <div class="tl-tags">${item.tags.map(tag=>`<span class="tl-tag">${tag}</span>`).join('')}</div>
          <div class="tl-cta">지도에서 보기</div>
        </button>
      </div>
    </div>`;
  });
  html+='</div>';
  return html;
}

function renderCrowd(){
  if(!crowdD.length)return`<div class="empty"><div class="empty-ico">📊</div><div class="empty-t">먼저 코스 찾기를 실행하세요</div></div>`;
  const sorted=[...crowdD].sort((a,b)=>a.visitors-b.visitors);
  const max=Math.max(...sorted.map(r=>r.visitors));
  return `<div class="crowd-list">${sorted.map((r,index)=>{
    const segments=Math.max(1,Math.round((r.visitors/max)*10));
    const note=r.level==='low'
      ? '지금 가장 여유롭게 둘러보기 좋아요'
      : r.level==='mid'
        ? '무난하지만 인기 시간대는 조금 붐빌 수 있어요'
        : '대기와 혼잡을 감안한 이동이 필요해요';
    return `<div class="crowd-row ${curRegion===r.key?'on':''}" onclick="jumpR('${r.key}')">
      <div class="crowd-emoji" style="background:${RG[r.key]?.bg||'#f0fdf4'}">${RG[r.key]?.e||'🌿'}</div>
      <div class="crowd-body">
        <div class="crowd-row-head">
          <div class="crowd-rname">${r.n||RG[r.key]?.n}</div>
          <div class="crowd-rank">${index+1}위 추천</div>
        </div>
        <div class="crowd-rsub">${r.sub||RG[r.key]?.sub}</div>
        <div class="crowd-bar-wrap">
          <div class="crowd-bar" style="width:${Math.round((r.visitors/max)*100)}%;background:${RG[r.key]?.c||'#16a34a'}"></div>
        </div>
        <div class="crowd-meter">${Array.from({length:10},(_,idx)=>`<span class="crowd-seg ${idx<segments?'on':''}" style="${idx<segments?`background:${RG[r.key]?.c||'#16a34a'}`:''}"></span>`).join('')}</div>
        <div class="crowd-note">${note}</div>
      </div>
      <div class="crowd-right">
        <div class="crowd-num">${(r.visitors||MC[r.key]?.visitors||0).toLocaleString()}</div>
        <div class="crowd-badge lv-${r.level||MC[r.key]?.level}">${lvLbl(r.level||MC[r.key]?.level)}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

  if(!lockerD.length)return`<div class="empty"><div class="empty-ico">🧳</div><div class="empty-t">보관함 정보 없음</div></div>`;

function toSheet(state){
  document.getElementById('sheet').className='sheet '+state;
  document.getElementById('sheetBg').className='sheet-bg '+(state!=='peek'?'open':'');
}

function onTab(name){
  setActiveTab(name);
  render();
}

function onPill(el,key){
  document.querySelectorAll('.eco-pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  if(key&&RG[key]){
    if(crowdD.length)jumpR(key);
    else previewRegion(key);
    return;
  }
  if(crowdD.length){
    curRegion=null;
    setActiveTab('crowd');
    render();
    plotOverview();
    updatePeek(getBestRegionKey());
    toSheet('half');
  }else{
    curRegion=null;
    setPillOn(null);
    updatePeek();
    renderLandingState();
    plotOverview();
    toSheet('peek');
  }
}

function setPillOn(key){
  const pills=document.querySelectorAll('.eco-pill');
  pills.forEach(p=>p.classList.remove('on'));
  if(!key){
    pills[0]?.classList.add('on');
    return;
  }
  pills.forEach(p=>{
    if(p.textContent.trim()===RG[key]?.n)p.classList.add('on');
  });
}

function previewRegion(key){
  curRegion=key;
  document.getElementById('rsel').value=key;
  setPillOn(key);
  updatePeek(key);
  renderLandingState();
  plotOverview(key);
  toSheet('half');
}

function openLockerTab(){
  if(!lockerD.length){
    toast('🧳 보관함 정보는 코스 추천 후 볼 수 있어요');
    return;
  }
  setActiveTab('locker');
  render();
  toSheet('half');
}

function focusSpot(index){
  const marker=courseMarkers[index];
  const spot=courseD[index];
  if(!marker||!spot)return;
  map.flyTo([spot.lat,spot.lng],13,{duration:.8});
  marker.openPopup();
  toast(`📍 ${spot.n} 위치를 지도에서 열었어요`);
}

async function jumpR(key){
  curRegion=key;
  courseD=COURSES[key]||[];
  lockerD=LOCKERS[key]||[];
  document.getElementById('spMain').innerHTML=`<b>${RG[key].n}</b> · ${RG[key].sub}`;
  updatePeek(key);
  setPillOn(key);
  setActiveTab('course');
  render();
  plotCourse(courseD);
  toSheet('half');
}

function lvLbl(lv){
  return lv==='low'?'혼잡 낮음':lv==='mid'?'보통':'혼잡 높음';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._);
  t._=setTimeout(()=>t.classList.remove('show'),3000);
}

function openModal(){
  document.getElementById('apiModal').classList.add('open');
  document.getElementById('keyInput').value=API_KEY;
}

function closeModal(){
  document.getElementById('apiModal').classList.remove('open');
}

document.getElementById('apiModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('apiModal'))closeModal();
});

function saveKey(){
  const k=document.getElementById('keyInput').value.trim();
  API_KEY=k||DEFAULT_API_KEY;
  if(k)localStorage.setItem('tapi',k);
  else localStorage.removeItem('tapi');
  closeModal();
  toast(k?'✅ API 키 저장됨':'🔧 기본 API 키로 복원됨');
}

let drag={on:false,y0:0};
document.getElementById('dragHandle').addEventListener('touchstart',e=>{
  drag={on:true,y0:e.touches[0].clientY};
});
document.addEventListener('touchmove',e=>{
  if(!drag.on)return;
  const dy=e.touches[0].clientY-drag.y0;
  if(Math.abs(dy)<12)return;
  const s=document.getElementById('sheet');
  const cur=s.classList.contains('full')?'full':s.classList.contains('half')?'half':'peek';
  if(dy>50){
    toSheet(cur==='full'?'half':'peek');
    drag.on=false;
  }else if(dy<-50){
    toSheet(cur==='peek'?'half':'full');
    drag.on=false;
  }
},{passive:true});
document.addEventListener('touchend',()=>{drag.on=false});

document.addEventListener('DOMContentLoaded',()=>{
  initMap();
  document.getElementById('tdate').value=formatInputDate(new Date());
  document.getElementById('tdate').addEventListener('change',syncDatePreset);
  syncDatePreset();
  updatePeek();
  renderLandingState();
  setPillOn(null);
  if(window.innerWidth>=768){
    document.getElementById('sheet').className='sheet';
    document.getElementById('sheet').style.transform='translateY(0)';
  }
});
</script>
</body>
</html>
