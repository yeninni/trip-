<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>?袁④텚 ECO ??六?/title>
<link rel="icon" type="image/png" href="assets/eco-mascot.png">
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2b7cc9d4e759fe9920ab0d6787224f71&autoload=false"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --frame-gap:16px;
  --layout-max:1280px;
  --header-offset:122px;
  --content-gap:18px;
  --ink:#1a1f1b;
  --ink2:#3d4a3f;
  --ink3:#6b7c6d;
  --ink4:#9aaa9c;
  --paper:#f5f2ec;
  --paper2:#ede9e0;
  --paper3:#e4e0d5;
  --moss:#2d5a3d;
  --moss2:#3d7a52;
  --leaf:#52a06a;
  --leaf2:#7bc491;
  --mint:#c8e8d0;
  --sage:#8fad95;
  --earth:#8b6f47;
  --earth2:#b89060;
  --sky:#e8f4f0;
  --r:16px;
  --r2:24px;
  --r3:32px;
}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100dvh;
  overflow-x:hidden;
  overflow-y:auto;
  position:relative;
}
.top-stack{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:14px 16px 10px;
  background:linear-gradient(180deg,rgba(245,242,236,.98) 0%,rgba(245,242,236,.95) 78%,rgba(245,242,236,.72) 100%);
  backdrop-filter:blur(16px) saturate(1.15);
  border-bottom:1px solid rgba(255,255,255,.65);
}
.app-shell{
  width:min(var(--layout-max),calc(100vw - var(--frame-gap)*2));
  margin:calc(var(--header-offset) + var(--content-gap)) 0 42px var(--frame-gap);
  display:grid;
  grid-template-columns:minmax(380px,1.02fr) minmax(340px,.84fr) minmax(250px,.54fr);
  gap:22px;
  align-items:start;
}
/* ???? MAP ???? */
#map-wrap{
  position:sticky;top:calc(var(--header-offset) + var(--content-gap));z-index:100;
  height:calc(100dvh - var(--header-offset) - 52px);min-height:560px;overflow:hidden;border-radius:30px;
  border:1px solid rgba(255,255,255,.82);
  background:linear-gradient(160deg,rgba(232,244,240,.96),rgba(245,242,236,.94));
  box-shadow:0 16px 42px rgba(45,90,61,.14);
}
#map{width:100%;height:100%}
.map-frame-copy{
  position:absolute;left:16px;right:16px;bottom:16px;z-index:2;
  display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
  pointer-events:none;
}
.map-frame-kicker{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--moss);background:rgba(245,242,236,.9);padding:6px 10px;border-radius:999px;
  border:1px solid rgba(255,255,255,.82);
  box-shadow:0 8px 20px rgba(26,31,27,.1);
}
.map-frame-title{
  margin-top:10px;font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;
  color:#fff;text-shadow:0 10px 24px rgba(26,31,27,.36);
}
.map-frame-sub{
  margin-top:6px;font-size:12px;color:rgba(255,255,255,.92);line-height:1.6;
  text-shadow:0 10px 24px rgba(26,31,27,.32);
}
.map-frame-badge{
  padding:10px 14px;border-radius:18px;
  background:rgba(245,242,236,.92);border:1px solid rgba(255,255,255,.82);
  box-shadow:0 10px 26px rgba(26,31,27,.12);
  min-width:108px;
}
.map-frame-badge strong{
  display:block;font-size:19px;font-family:'Noto Serif KR',serif;color:var(--moss);
}
.map-frame-badge span{
  display:block;margin-top:4px;font-size:11px;color:var(--ink3);font-weight:600;
}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{margin-bottom:18px!important;margin-right:16px!important}
.leaflet-control-zoom a{
  background:rgba(245,242,236,.92)!important;
  border:none!important;
  color:var(--ink)!important;
  font-size:16px!important;
  width:36px!important;height:36px!important;
  line-height:36px!important;
  border-radius:12px!important;
  box-shadow:0 2px 12px rgba(0,0,0,.1)!important;
}
.leaflet-popup-content-wrapper{
  background:transparent!important;
  box-shadow:none!important;
  padding:0!important;
}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip-container{display:none!important}

/* ???? TOP ???? */
.topbar{
  position:relative;
  padding:0;
  display:flex;align-items:center;gap:10px;
}
.brand{
  display:flex;align-items:center;gap:10px;
  background:rgba(245,242,236,.94);
  backdrop-filter:blur(16px) saturate(1.4);
  padding:9px 16px 9px 10px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 2px 20px rgba(45,90,61,.14);
  flex-shrink:0;text-decoration:none;
}
.brand-mark{
  width:30px;height:30px;border-radius:10px;
  background:linear-gradient(145deg,var(--moss2),var(--moss));
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.brand-mark img{width:100%;height:100%;object-fit:cover;display:block}
.brand-name{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700;color:var(--ink)}
.brand-name span{color:var(--leaf);font-size:11px;display:block;font-family:'Noto Sans KR',sans-serif;font-weight:400;margin-top:-1px}

.search-pill{
  flex:1;display:flex;align-items:center;gap:10px;
  background:rgba(245,242,236,.94);
  backdrop-filter:blur(16px) saturate(1.4);
  padding:11px 16px;border-radius:40px;
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 2px 20px rgba(45,90,61,.14);
  cursor:pointer;
  transition:box-shadow .2s,border-color .2s;
}
.search-pill:hover{box-shadow:0 4px 28px rgba(45,90,61,.2);border-color:var(--leaf2)}
.sp-icon{color:var(--ink3);font-size:14px}
.sp-main{flex:1;font-size:13px;color:var(--ink3)}
.sp-main b{color:var(--ink);font-weight:600}
.sp-sep{width:1px;height:18px;background:var(--paper3)}
.sp-date{font-size:12px;font-weight:600;color:var(--leaf);white-space:nowrap}

.btn-setting{
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(245,242,236,.94);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 2px 20px rgba(45,90,61,.14);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .15s;
}
.btn-setting:hover{transform:rotate(45deg)}
.btn-setting svg{width:18px;height:18px;stroke:var(--ink2);fill:none;stroke-width:1.8}

/* ???? PILLS ???? */
.pill-row{
  position:relative;
  padding:10px 0 0;
  display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;
}
.pill-row::-webkit-scrollbar{display:none}
.eco-pill{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:40px;
  background:rgba(245,242,236,.9);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.6);
  font-size:12px;font-weight:500;color:var(--ink2);
  cursor:pointer;transition:all .2s;
  box-shadow:0 1px 10px rgba(0,0,0,.07);
  white-space:nowrap;
}
.eco-pill .p-dot{width:6px;height:6px;border-radius:50%;background:var(--ink4)}
.eco-pill:hover{border-color:var(--leaf);color:var(--moss)}
.eco-pill.on{
  background:var(--moss);border-color:var(--moss);color:#fff;
  box-shadow:0 4px 16px rgba(45,90,61,.35);
}
.eco-pill.on .p-dot{background:var(--leaf2)}

/* ???? SHEET ???? */
.sheet-bg{
  display:none!important;
  position:fixed;inset:0;z-index:400;
  background:transparent;pointer-events:none;
  transition:background .35s;
}
.sheet-bg.open{background:rgba(26,31,27,.35);pointer-events:all}

.sheet{
  position:relative;z-index:80;
  background:var(--paper);
  border-radius:28px;
  box-shadow:0 16px 42px rgba(45,90,61,.16);
  transform:none!important;
  transition:box-shadow .25s ease;
  min-height:calc(100dvh - var(--header-offset) - 52px);
  display:flex;flex-direction:column;
  border:1px solid rgba(255,255,255,.8);
}
.side-rail{
  display:flex;flex-direction:column;gap:12px;
  position:relative;top:auto;z-index:140;
}
.sheet.peek,.sheet.half,.sheet.full{transform:none!important}

.sheet-drag{display:none}
.sheet-drag-bar{display:inline-block;width:40px;height:4px;border-radius:2px;background:var(--paper3)}

/* Peek bar */
.peek-bar{
  padding:0 20px 16px;
  display:flex;align-items:center;gap:14px;cursor:default;
}
.peek-region-dot{
  width:48px;height:48px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  background:var(--mint);
}
.peek-text{flex:1}
.peek-name{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700}
.peek-meta{font-size:12px;color:var(--ink3);margin-top:3px}
.peek-meta b{color:var(--leaf);font-weight:600}
.peek-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.peek-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:999px;
  background:var(--paper2);color:var(--ink2);
  font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.75);
}
.peek-chip-btn{
  border:none;cursor:pointer;
  background:rgba(82,160,106,.14);color:var(--moss);
}
.peek-chevron{display:none}

/* Tabs */
.tabs{
  display:flex;padding:0 20px;
  border-bottom:1px solid var(--paper3);
  flex-shrink:0;display:none;
}
.t-tab{
  padding:12px 16px;font-size:13px;font-weight:500;
  color:var(--ink3);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .18s;white-space:nowrap;
}
.t-tab.on{color:var(--moss);border-bottom-color:var(--moss)}

.sheet-body{overflow:visible;flex:1}
.section-head{
  display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
  margin:22px 20px 0;
}
.section-title{
  font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--ink);
}
.section-note{
  font-size:11px;color:var(--ink4);line-height:1.5;text-align:right;
}

/* ???? SUMMARY BAND ???? */
.sum-band{
  display:flex;gap:0;
  padding:20px 20px 4px;
}
.sum-cell{
  flex:1;text-align:center;
  padding:14px 8px;
  background:var(--paper2);border-radius:14px;margin:0 4px;
}
.sum-cell:first-child{margin-left:0}.sum-cell:last-child{margin-right:0}
.sum-val{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--moss)}
.sum-key{font-size:10px;color:var(--ink3);margin-top:3px;letter-spacing:.03em}

/* ???? TIMELINE ???? */
.tl{padding:20px 20px 4px}
.tl-node{display:flex;gap:14px;padding-bottom:0}
.tl-spine{display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0}
.tl-orb{
  width:40px;height:40px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;z-index:1;
  border:1.5px solid rgba(255,255,255,.7);
}
.tl-vein{flex:1;width:2px;background:var(--paper3);margin:6px 0;min-height:16px}
.tl-card{flex:1;padding:4px 0 22px;cursor:pointer}
.tl-card-btn{
  width:100%;text-align:left;border:none;cursor:pointer;
  background:rgba(255,255,255,.58);border-radius:18px;
  padding:14px 16px;transition:transform .18s,box-shadow .18s,background .18s;
  box-shadow:0 1px 0 rgba(255,255,255,.55) inset;
}
.tl-card-btn:hover{
  transform:translateY(-1px);background:#fff;
  box-shadow:0 8px 22px rgba(45,90,61,.08);
}
.tl-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tl-action-link{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:36px;padding:9px 12px;border-radius:12px;
  background:#fff;border:1px solid rgba(82,160,106,.22);
  color:var(--moss);font-size:11px;font-weight:700;text-decoration:none;
  transition:transform .18s,box-shadow .18s,background .18s;
}
.tl-action-link:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(45,90,61,.08);
}
.tl-action-link.secondary{
  background:rgba(82,160,106,.12);
}
.tl-when{font-size:11px;font-weight:600;color:var(--ink4);letter-spacing:.06em;text-transform:uppercase}
.tl-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;margin-top:3px}
.tl-body{font-size:12px;color:var(--ink3);margin-top:4px;line-height:1.55}
.tl-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.tl-cta{margin-top:10px;font-size:11px;color:var(--moss);font-weight:700}
.tl-tag{
  font-size:11px;padding:3px 10px;border-radius:20px;
  background:var(--paper3);color:var(--ink3);font-weight:500;
}
.tl-bus{
  margin-top:12px;padding:12px 12px 10px;
  border-radius:14px;background:rgba(232,244,240,.8);
  border:1px solid rgba(255,255,255,.8);
}
.tl-bus-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  font-size:11px;font-weight:700;color:var(--moss);
}
.tl-bus-stop{font-size:12px;color:var(--ink2);margin-top:6px}
.tl-bus-note{font-size:11px;color:var(--ink3);margin-top:6px;line-height:1.5}
.tl-bus-routes{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tl-bus-route{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:var(--ink2);
  padding:5px 8px;border-radius:999px;background:#fff;
}
.tl-bus-route b{color:var(--moss)}
.tl-transit{
  display:flex;align-items:center;gap:8px;
  padding:0 0 16px 54px;
  font-size:11px;color:var(--ink4);font-weight:500;
}
.tl-transit-line{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--paper3) 0,var(--paper3) 5px,transparent 5px,transparent 10px)}

/* ???? CROWD ???? */
.crowd-list{padding:20px}
.crowd-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:20px;
  background:var(--paper2);margin-bottom:10px;
  cursor:pointer;
  border:1.5px solid transparent;
  transition:all .2s;
}
.crowd-row:hover{background:#fff;border-color:var(--leaf2)}
.crowd-row.on{background:#fff;border-color:var(--moss);box-shadow:0 4px 20px rgba(45,90,61,.1)}
.crowd-emoji{
  width:48px;height:48px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.crowd-body{flex:1;min-width:0}
.crowd-row-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.crowd-rname{font-weight:600;font-size:14px}
.crowd-rsub{font-size:11px;color:var(--ink4);margin-top:2px}
.crowd-rank{
  font-size:10px;font-weight:700;color:var(--moss);
  padding:4px 8px;border-radius:999px;background:rgba(82,160,106,.14);
  white-space:nowrap;
}
.crowd-bar-wrap{margin-top:10px;height:8px;border-radius:999px;background:var(--paper3);overflow:hidden}
.crowd-bar{height:100%;border-radius:999px;transition:width .6s ease}
.crowd-meter{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:8px}
.crowd-seg{height:5px;border-radius:999px;background:rgba(156,170,156,.28)}
.crowd-seg.on{background:var(--moss)}
.crowd-note{font-size:11px;color:var(--ink3);margin-top:8px}
.crowd-right{text-align:right;flex-shrink:0}
.crowd-num{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700}
.crowd-badge{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:4px;font-weight:600;
}
.lv-low{background:#dcfce7;color:#14532d}
.lv-mid{background:#fef9c3;color:#713f12}
.lv-high{background:#fee2e2;color:#7f1d1d}

/* ???? LOCKER ???? */
.locker-list{padding:20px;display:flex;flex-direction:column;gap:10px}
.locker-card{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px;border-radius:20px;background:var(--paper2);
}
.locker-ico{
  width:44px;height:44px;border-radius:14px;
  background:var(--sky);display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;
}
.lk-name{font-size:14px;font-weight:600}
.lk-addr{font-size:11px;color:var(--ink4);margin-top:3px}
.lk-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.lk-dot{width:7px;height:7px;border-radius:50%}
.lk-dot.ok{background:var(--leaf)}
.lk-dot.full{background:#ef4444}
.lk-txt{font-size:12px;font-weight:600}
.lk-prog{margin-top:7px;height:4px;border-radius:2px;background:var(--paper3);overflow:hidden}
.lk-prog-fill{height:100%;border-radius:2px;transition:width .5s ease}
.locker-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* ???? SEARCH PANEL ???? */
.sp-panel{
  position:fixed;top:0;left:0;right:0;z-index:700;
  background:var(--paper);
  border-radius:0 0 28px 28px;
  padding:20px 20px 24px;
  transform:translateY(-110%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  box-shadow:0 8px 40px rgba(45,90,61,.2);
  border-bottom:1px solid var(--paper3);
}
.sp-panel.open{transform:translateY(0)}
.sp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sp-title{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700}
.sp-close{
  width:32px;height:32px;border-radius:10px;border:none;
  background:var(--paper3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--ink2);
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.f-field{}
.f-lbl{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
.f-ctrl{
  width:100%;padding:12px 14px;
  border-radius:14px;border:1.5px solid var(--paper3);
  background:var(--paper2);font-family:inherit;font-size:13px;
  color:var(--ink);appearance:none;transition:border-color .2s,background .2s;
}
.f-ctrl:focus{outline:none;border-color:var(--leaf);background:#fff}
.date-presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.date-chip{
  border:none;cursor:pointer;
  border-radius:999px;padding:8px 12px;
  background:var(--paper2);color:var(--ink2);
  font-family:inherit;font-size:12px;font-weight:600;
  transition:background .18s,color .18s,transform .18s,box-shadow .18s;
  border:1px solid rgba(255,255,255,.75);
}
.date-chip:hover{transform:translateY(-1px);background:#fff}
.date-chip.on{
  background:var(--moss);color:#fff;
  box-shadow:0 8px 20px rgba(45,90,61,.2);
}
.btn-run{
  width:100%;padding:15px;border-radius:18px;border:none;
  background:linear-gradient(145deg,var(--moss2),var(--moss));
  color:#fff;font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;
  cursor:pointer;margin-top:4px;letter-spacing:.03em;
  transition:opacity .2s,transform .15s;
  box-shadow:0 6px 24px rgba(45,90,61,.28);
}
.btn-run:hover{opacity:.92;transform:translateY(-1px)}
.btn-run:disabled{opacity:.5;transform:none;cursor:not-allowed}

/* ???? STATES ???? */
.empty{padding:48px 20px;text-align:center}
.empty-ico{font-size:48px;margin-bottom:14px}
.empty-t{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;color:var(--ink2)}

.toast{

  }

function measureBusDistance(lat1,lng1,lat2,lng2){
  const toRad=v=>v*Math.PI/180;
  const earthRadius=6371000;
  const dLat=toRad(lat2-lat1);
  const dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2
    +Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return earthRadius*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function findNearbyBusStopFromDataset(lat,lng){
  const stops=await loadBusStopDataset();
  if(!Array.isArray(stops)||!stops.length)return null;
  let nearest=null;
  let nearestDistance=Infinity;
  for(const stop of stops){
    const dist=measureBusDistance(lat,lng,Number(stop.lat),Number(stop.lng));
    if(dist<nearestDistance){
      nearest=stop;
      nearestDistance=dist;
    }
  }
  if(!nearest)return null;
  return {
    nodeid:nearest.nodeId,
    nodenm:nearest.stopName,
    nodeno:nearest.stopNo,
    citycode:nearest.cityCode,
    cityname:nearest.cityName,
    distanceMeters:Math.round(nearestDistance),
    source:'local_dataset',
  };
}

async function fetchNearbyBusStop(lat,lng){
  try{
    const localStop=await findNearbyBusStopFromDataset(lat,lng);
    if(localStop)return localStop;
  }catch{}
  if(!BUS_API_KEY)return null;
  const url=`/api/bus/stops`
    +`?serviceKey=${encodeURIComponent(BUS_API_KEY)}&gpsLati=${encodeURIComponent(lat)}&gpsLong=${encodeURIComponent(lng)}&_type=json&numOfRows=10&pageNo=1`;
  const r=await fetch(url);
  if(!r.ok){
    const detail=await readBusProxyError(r);
    throw new Error(detail);
  }
  const d=await r.json();
  return listFromApi(d?.response?.body?.items?.item)[0]||null;
}

async function fetchBusArrivals(cityCode,nodeId){
  if(!BUS_API_KEY||!cityCode||!nodeId)return [];
  const url=`/api/bus/arrivals`
    +`?serviceKey=${encodeURIComponent(BUS_API_KEY)}&cityCode=${encodeURIComponent(cityCode)}&nodeId=${encodeURIComponent(nodeId)}&_type=json&numOfRows=10&pageNo=1`;
  const r=await fetch(url);
  if(!r.ok){
    const detail=await readBusProxyError(r);
    throw new Error(detail);
  }
  const d=await r.json();
  const items=listFromApi(d?.response?.body?.items?.item);
  return items
    .filter(item=>item?.arrtime)
    .sort((a,b)=>Number(a.arrtime||0)-Number(b.arrtime||0))
    .slice(0,3);
}

function clampCoord(value,min,max){
  return Math.min(Math.max(value,min),max);
}

function clampToJeonnam(lat,lng){
  return {
    lat:clampCoord(lat,JEONNAM_BOUNDS.south,JEONNAM_BOUNDS.north),
    lng:clampCoord(lng,JEONNAM_BOUNDS.west,JEONNAM_BOUNDS.east),
  };
}

function restrictKakaoMapBounds(){
  if(!map||mapProvider!=='kakao'||kakaoBoundsGuard)return;
  const center=map.getCenter();
  const clamped=clampToJeonnam(center.getLat(),center.getLng());
  const needsMove=Math.abs(clamped.lat-center.getLat())>0.0001||Math.abs(clamped.lng-center.getLng())>0.0001;
  const level=Math.min(map.getLevel(),10);
  if(!needsMove&&level===map.getLevel())return;
  kakaoBoundsGuard=true;
  map.setLevel(level);
  if(needsMove){
    map.panTo(new kakao.maps.LatLng(clamped.lat,clamped.lng));
  }
  setTimeout(()=>{kakaoBoundsGuard=false;},0);
}

function getPresetDate(kind){
  const today=new Date();
  today.setHours(12,0,0,0);
  if(kind==='today')return today;
  const saturday=new Date(today);
  const offset=(6-today.getDay()+7)%7;
  saturday.setDate(today.getDate()+offset);
  if(kind==='weekend')return saturday;
  const nextSaturday=new Date(saturday);
  nextSaturday.setDate(saturday.getDate()+7);
  return nextSaturday;
}

async function fetchCrowd(date){
  if(!API_KEY)return mockCrowd();
  const ym=date.replace(/-/g,'').slice(0,6);
  const url=`https://apis.data.go.kr/B551011/TourismResourceStatsService/getPredictVisitorsInfo`
    +`?serviceKey=${encodeURIComponent(API_KEY)}&YM=${ym}&SIDO=?袁⑥뵬??ㅻ즲&MobileOS=ETC&MobileApp=EcoTravel&_type=json&numOfRows=20`;
  try{
    const r=await fetch(url);
    const d=await r.json();
    const items=d?.response?.body?.items?.item;
    if(!items)throw 0;
    toast('????깆삜??API ?怨뺣짗');
    return parseItems(items);
  }catch{
    toast('?醫묓닔 ??묐탣 ?怨쀬뵠??????);
    return mockCrowd();
  }
}

function parseItems(items){
  const arr=Array.isArray(items)?items:[items];
  const mapped={};
  arr.forEach(it=>{
    const key=nm2k(it.SIGNGU_NM||'');
    if(!key)return;
    const visitors=parseInt(it.PREDICT_CNT||0,10);
    mapped[key]={key,...RG[key],level:visitors>2000?'high':visitors>1000?'mid':'low',visitors};
  });
  return Object.keys(RG).map(key=>mapped[key]||{key,...RG[key],...MC[key]});
}

function mockCrowd(){
  return Object.keys(RG).map(key=>({key,...RG[key],...MC[key]}));
}

function nm2k(nm){
  if(nm.includes('????))return'yeosu';
  if(nm.includes('??뽰퓝'))return'suncheon';
  if(nm.includes('??곷펶'))return'damyang';
  if(nm.includes('筌뤴뫚猷?))return'mokpo';
  if(nm.includes('癰귣똻苑?))return'boseong';
  if(nm.includes('揶쏅벡彛?))return'gangjin';
  return null;
}

    toSheet('half');
  }else{
    curRegion=null;
    setPillOn(null);
    updatePeek();
    renderLandingState();
    plotOverview();
    updateMapFrame();
    toSheet('peek');
  }
}

function setPillOn(key){
  const pills=document.querySelectorAll('.eco-pill');
  pills.forEach(p=>p.classList.remove('on'));
  if(!key){
    pills[0]?.classList.add('on');
    return;
  }
  pills.forEach(p=>{
    if(p.textContent.trim()===RG[key]?.n)p.classList.add('on');
  });
}

function previewRegion(key){
  curRegion=key;
  document.getElementById('rsel').value=key;
  setPillOn(key);
  updatePeek(key);
  updateMapFrame(key);
  renderLandingState();
  plotOverview(key);
  toSheet('half');
}

function openLockerTab(){
  if(!lockerD.length){
    toast('???癰귣떯????類ｋ궖???꾨뗄???곕뗄荑???癰?????됰선??);
    return;
  }
  setActiveTab('locker');
  render();
  toSheet('half');
}

function focusSpot(index){
  const marker=courseMarkers[index];
  const spot=courseD[index];
  if(!marker||!spot)return;
  const mapWrap=document.getElementById('map-wrap');
  if(mapProvider==='kakao'){
    map.setLevel(5);
    map.panTo(makeLatLng(spot.lat,spot.lng));
  }else{
    map.flyTo(marker.position,13,{duration:.8});
  }
  if(window.innerWidth<1100){
    toSheet('peek');
    mapWrap?.scrollIntoView({behavior:'smooth',block:'start'});
  }else{
    window.scrollTo({top:0,behavior:'smooth'});
  }
  marker.open();
  toast(`?諭?${spot.n} ?袁⑺뒄??筌왖?袁⑸퓠????곷???곸뒄`);
}

async function jumpR(key){
  curRegion=key;
  courseD=COURSES[key]||[];
  lockerD=LOCKERS[key]||[];
  document.getElementById('spMain').innerHTML=`<b>${RG[key].n}</b> 夷?${RG[key].sub}`;
  updatePeek(key);
  updateMapFrame(key);
  setPillOn(key);
  setActiveTab('course');
  render();
  plotCourse(courseD);
  loadBusInfoForCurrentCourse();
  toSheet('half');
}

function lvLbl(lv){
  return lv==='low'?'??깆삜 ????:lv==='mid'?'癰귣똾??:'??깆삜 ?誘れ벉';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._);
  t._=setTimeout(()=>t.classList.remove('show'),3000);
}

function openModal(){
  document.getElementById('apiModal').classList.add('open');
  document.getElementById('keyInput').value=API_KEY;
  document.getElementById('busKeyInput').value=BUS_API_KEY;
}

function closeModal(){
  document.getElementById('apiModal').classList.remove('open');
}

document.getElementById('apiModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('apiModal'))closeModal();
});

function saveKey(){
  const k=document.getElementById('keyInput').value.trim();
  const busKey=document.getElementById('busKeyInput').value.trim();
  API_KEY=k||DEFAULT_API_KEY;
  BUS_API_KEY=busKey||DEFAULT_BUS_API_KEY;
  if(k)localStorage.setItem('tapi',k);
  else localStorage.removeItem('tapi');
  if(busKey)localStorage.setItem('bus_api_key',busKey);
  else localStorage.removeItem('bus_api_key');
  closeModal();
  toast('??Tour API / 甕곌쑴??API ??쇱젟?????貫由??щ빍??);
}

let drag={on:false,y0:0};
document.getElementById('dragHandle').addEventListener('touchstart',e=>{
  drag={on:true,y0:e.touches[0].clientY};
});
document.addEventListener('touchmove',e=>{
  if(!drag.on)return;
  const dy=e.touches[0].clientY-drag.y0;
  if(Math.abs(dy)<12)return;
  const s=document.getElementById('sheet');
  const cur=s.classList.contains('full')?'full':s.classList.contains('half')?'half':'peek';
  if(dy>50){
    toSheet(cur==='full'?'half':'peek');
    drag.on=false;
  }else if(dy<-50){
    toSheet(cur==='peek'?'half':'full');
    drag.on=false;
  }
},{passive:true});
document.addEventListener('touchend',()=>{drag.on=false});

document.addEventListener('DOMContentLoaded',()=>{
  const boot=()=>{
    initMap();
    document.getElementById('tdate').value=formatInputDate(new Date());
    document.getElementById('tdate').addEventListener('change',syncDatePreset);
    syncDatePreset();
    updatePeek();
    renderLandingState();
    setPillOn(null);
    window.addEventListener('resize',refreshMapLayout);
    if(window.innerWidth>=768){
      document.getElementById('sheet').className='sheet';
      document.getElementById('sheet').style.transform='translateY(0)';
    }
  };
  if(window.kakao?.maps?.load){
    kakao.maps.load(boot);
  }else{
    boot();
  }
});
</script>
