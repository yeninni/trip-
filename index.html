<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jeonnam Eco Trip</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2b7cc9d4e759fe9920ab0d6787224f71&autoload=false"></script>
  <style>
    body{margin:0;font:14px/1.5 Segoe UI,system-ui,sans-serif;background:#f3efe7;color:#1e241f}
    .app{min-height:100vh;display:grid;grid-template-columns:1.15fr .85fr}
    #map{min-height:46vh;background:#dfe7da}
    .side{padding:18px;display:flex;flex-direction:column;gap:14px}
    .card{background:#fff;border:1px solid #ded7ca;border-radius:20px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
    .hero h1{margin:0 0 8px;font-size:28px}
    .hero p{margin:0;color:#5d6a61}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .full{grid-column:1/-1}
    label{display:block;margin-bottom:6px;color:#5d6a61;font-size:12px;font-weight:700;text-transform:uppercase}
    input,select,button{font:inherit}
    input,select{width:100%;padding:11px 12px;border-radius:14px;border:1px solid #d8d0c2;background:#fff}
    .run{border:0;border-radius:16px;padding:13px;background:#2d6a47;color:#fff;font-weight:700;cursor:pointer}
    .run:disabled{opacity:.7;cursor:progress}
    .sum{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .sum .box{background:#fff;border:1px solid #e5dfd4;border-radius:16px;padding:12px}
    .val{font-size:20px;font-weight:800}.lbl{color:#617067;font-size:12px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{padding:9px 12px;border-radius:999px;border:1px solid #d9d2c6;background:#fff;color:#5e6a62;cursor:pointer;font-weight:700}.tab.on{background:#2d6a47;color:#fff;border-color:#2d6a47}
    .list{display:grid;gap:10px}.item{background:#fff;border:1px solid #e4ddd1;border-radius:16px;padding:13px}
    .item h3{margin:0 0 6px;font-size:16px}.muted{color:#627068}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{padding:4px 8px;border-radius:999px;background:#eff4f0;color:#4f5f56;font-size:12px}
    .course{cursor:pointer}.row{display:flex;justify-content:space-between;gap:12px}.badge{min-width:34px;height:34px;border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:800}
    .empty{padding:34px 12px;text-align:center;color:#66746b}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#1f261f;color:#fff;padding:10px 14px;border-radius:999px;opacity:0;transition:.2s;pointer-events:none}.toast.show{opacity:1}
    @media (max-width:980px){.app{grid-template-columns:1fr}.sum{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="app">
    <div id="map"></div>
    <div class="side">
      <div class="card hero">
        <h1>Jeonnam ECO Trip</h1>
        <p>Tourism info, crowd prediction, Durunubi, public lockers, and realtime buses in one planner.</p>
      </div>
      <div class="card">
        <div class="grid">
          <div><label for="date">Date</label><input id="date" type="date"></div>
          <div><label for="mode">Mode</label><select id="mode"><option value="walk">Walk</option><option value="bike">Bike</option><option value="both">Walk + Bike</option></select></div>
          <div class="full"><label for="region">Region</label><select id="region"><option value="">Auto pick lowest crowd</option><option value="yeosu">Yeosu</option><option value="suncheon">Suncheon</option><option value="damyang">Damyang</option><option value="mokpo">Mokpo</option><option value="boseong">Boseong</option><option value="gangjin">Gangjin</option></select></div>
          <button class="run full" id="run">Build eco route</button>
        </div>
      </div>
      <div class="sum" id="sum"></div>
      <div class="tabs"><button class="tab on" data-tab="course">Course</button><button class="tab" data-tab="crowd">Crowd</button><button class="tab" data-tab="locker">Lockers</button></div>
      <div class="card" id="content"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const API_KEY='c8d7a4c439a6ab3c5c9028a2e513913701fa8caa7c07cfa2e024187e3e8b7d42';
    const BUS_KEY='c8d7a4c439a6ab3c5c9028a2e513913701fa8caa7c07cfa2e024187e3e8b7d42';
    const REGIONS={yeosu:{label:'\uC5EC\uC218',match:'\uC5EC\uC218',code:'4613000000',lat:34.7604,lng:127.6622,color:'#0ea5e9',soft:'#e0f2fe',hints:['\uC5EC\uC218','\uB0A8\uD30C\uB791'],fallback:[{type:'spot',icon:'Y',color:'#0ea5e9',title:'Odongdo',time:'09:00',desc:'Coastal walking course',tags:['Walk','Coast'],lat:34.7468,lng:127.7446},{type:'food',icon:'F',color:'#c98d18',title:'Yeosu market',time:'11:00',desc:'Local lunch stop',tags:['Food'],lat:34.7568,lng:127.6623},{type:'spot',icon:'P',color:'#0ea5e9',title:'Square',time:'13:00',desc:'Sea view plaza',tags:['Walk'],lat:34.7598,lng:127.6614},{type:'stay',icon:'H',color:'#c670a0',title:'Stay',time:'18:00',desc:'Stay near waterfront',tags:['Stay'],lat:34.7432,lng:127.6784}],lockers:[{name:'Yeosu station locker',addr:'Yeosu station area',avail:12,total:20},{name:'Odongdo info desk',addr:'Odongdo road',avail:5,total:10}]},suncheon:{label:'\uC21C\uCC9C',match:'\uC21C\uCC9C',code:'4615000000',lat:34.9506,lng:127.4875,color:'#16a34a',soft:'#dcfce7',hints:['\uC21C\uCC9C','\uB0A8\uD30C\uB791'],fallback:[{type:'spot',icon:'S',color:'#16a34a',title:'Garden',time:'09:00',desc:'Garden eco route',tags:['Walk'],lat:34.9176,lng:127.4891},{type:'spot',icon:'W',color:'#16a34a',title:'Wetland',time:'11:30',desc:'Wetland boardwalk',tags:['Eco'],lat:34.8988,lng:127.5008},{type:'food',icon:'F',color:'#c98d18',title:'Lunch',time:'13:00',desc:'Downtown lunch stop',tags:['Food'],lat:34.9506,lng:127.4875},{type:'stay',icon:'H',color:'#c670a0',title:'Stay',time:'17:30',desc:'Stay near garden district',tags:['Stay'],lat:34.9504,lng:127.4872}],lockers:[{name:'Suncheon locker',addr:'Station plaza',avail:18,total:24}]},damyang:{label:'\uB2F4\uC591',match:'\uB2F4\uC591',code:'4671000000',lat:35.3219,lng:126.9879,color:'#65a30d',soft:'#ecfccb',hints:['\uB2F4\uC591','\uC601\uC0B0\uAC15','\uBA54\uD0C0'],fallback:[{type:'spot',icon:'D',color:'#65a30d',title:'Juknokwon',time:'09:00',desc:'Bamboo forest walk',tags:['Walk'],lat:35.3206,lng:126.9854},{type:'spot',icon:'B',color:'#65a30d',title:'Meta road',time:'10:30',desc:'Bike and walk road',tags:['Bike'],lat:35.3264,lng:126.9877},{type:'food',icon:'F',color:'#c98d18',title:'Lunch',time:'12:30',desc:'Local meal stop',tags:['Food'],lat:35.3219,lng:126.9879},{type:'stay',icon:'H',color:'#c670a0',title:'Stay',time:'16:00',desc:'Small forest stay',tags:['Stay'],lat:35.3198,lng:126.9862}],lockers:[{name:'Terminal locker',addr:'Damyang-eup',avail:6,total:12}]},mokpo:{label:'\uBAA9\uD3EC',match:'\uBAA9\uD3EC',code:'4611000000',lat:34.8118,lng:126.3922,color:'#d97706',soft:'#fef3c7',hints:['\uBAA9\uD3EC','\uC11C\uD574\uB791','\uC720\uB2EC'],fallback:[{type:'spot',icon:'M',color:'#d97706',title:'History museum',time:'09:00',desc:'Historic city walk',tags:['Walk'],lat:34.7928,lng:126.3892},{type:'spot',icon:'V',color:'#d97706',title:'Trail',time:'10:30',desc:'City view trail',tags:['View'],lat:34.8043,lng:126.3864},{type:'food',icon:'F',color:'#c98d18',title:'Port food street',time:'12:30',desc:'Seafood lunch zone',tags:['Food'],lat:34.8118,lng:126.3922},{type:'stay',icon:'H',color:'#c670a0',title:'Stay',time:'17:00',desc:'Stay near station',tags:['Stay'],lat:34.8120,lng:126.3918}],lockers:[{name:'Mokpo station locker',addr:'Yeongsan-ro',avail:14,total:20}]},boseong:{label:'\uBCF4\uC131',match:'\uBCF4\uC131',code:'4678000000',lat:34.7716,lng:127.0803,color:'#059669',soft:'#d1fae5',hints:['\uBCF4\uC131','\uB0A8\uD30C\uB791','\uB179\uCC28'],fallback:[{type:'spot',icon:'T',color:'#059669',title:'Tea field',time:'09:00',desc:'Tea plantation walk',tags:['Walk'],lat:34.7716,lng:127.0803},{type:'food',icon:'C',color:'#c98d18',title:'Tea cafe',time:'11:00',desc:'Tea break stop',tags:['Cafe'],lat:34.772,lng:127.0811},{type:'spot',icon:'B',color:'#059669',title:'Bike trail',time:'13:00',desc:'Easy coast bike route',tags:['Bike'],lat:34.7242,lng:127.0948},{type:'stay',icon:'H',color:'#c670a0',title:'Stay',time:'16:00',desc:'Quiet countryside stay',tags:['Stay'],lat:34.7718,lng:127.0806}],lockers:[{name:'Boseong terminal locker',addr:'Boseong-eup',avail:4,total:8}]},gangjin:{label:'\uAC15\uC9C4',match:'\uAC15\uC9C4',code:'4681000000',lat:34.6424,lng:126.7673,color:'#7c3aed',soft:'#ede9fe',hints:['\uAC15\uC9C4','\uB0A8\uD30C\uB791','\uB2E4\uC0B0'],fallback:[{type:'spot',icon:'G',color:'#7c3aed',title:'Museum',time:'09:00',desc:'Celadon museum stop',tags:['History'],lat:34.6424,lng:126.7673},{type:'spot',icon:'T',color:'#7c3aed',title:'Dasan trail',time:'11:00',desc:'Historical walk route',tags:['Walk'],lat:34.6341,lng:126.7462},{type:'food',icon:'F',color:'#c98d18',title:'Lunch',time:'13:00',desc:'Local meal point',tags:['Food'],lat:34.6426,lng:126.7678},{type:'stay',icon:'H',color:'#c670a0',title:'Hanok stay',time:'17:00',desc:'Historic village stay',tags:['Stay'],lat:34.6421,lng:126.7671}],lockers:[{name:'Gangjin terminal locker',addr:'Gangjin-eup',avail:7,total:10}]}};
    const state={tab:'course',date:'',mode:'walk',regionKey:'',crowd:[],course:[],lockers:[],durunubi:[],bus:[]}; let map,info,regionMarkers=[],courseMarkers=[],courseLine;
    const $=id=>document.getElementById(id), arr=x=>!x?[]:Array.isArray(x)?x:[x], qs=o=>{const q=new URLSearchParams(); Object.entries(o).forEach(([k,v])=>v!==''&&v!=null&&q.set(k,String(v))); return q.toString();};
    const toast=m=>{const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._); t._=setTimeout(()=>t.classList.remove('show'),2600);};
    const crowdLabel=l=>l==='low'?'Low':l==='mid'?'Mid':'High';
    const modeLabel=()=>state.mode==='bike'?'Bike':state.mode==='both'?'Walk + Bike':'Walk';
    const distance=(a,b)=>{const r=v=>v*Math.PI/180,e=6371,dLat=r(b.lat-a.lat),dLng=r(b.lng-a.lng),s1=r(a.lat),s2=r(b.lat); return 2*e*Math.asin(Math.sqrt(Math.sin(dLat/2)**2+Math.cos(s1)*Math.cos(s2)*Math.sin(dLng/2)**2));};
    const minutes=(a,b)=>Math.max(6,Math.round(distance(a,b)/(state.mode==='bike'?12:state.mode==='both'?7:4.2)*60));
    const courseStats=stops=>{const km=stops.reduce((s,x,i)=>i?s+distance(stops[i-1],x):s,0),move=stops.reduce((s,x,i)=>i?s+minutes(stops[i-1],x):s,0),stay=stops.reduce((s,x)=>s+(x.type==='food'?60:x.type==='stay'?45:75),0),tot=move+stay; return{distance:km.toFixed(1),time:`${Math.floor(tot/60)}h ${tot%60}m`}};
    async function json(url){const r=await fetch(url); if(!r.ok)throw new Error(r.status); return r.json();}
    function initMap(){if(!(window.kakao&&window.kakao.maps)){ $('map').innerHTML='<div class="empty">Kakao map failed. Check domain registration for 127.0.0.1:8001 and localhost:8001.</div>'; return;} map=new kakao.maps.Map($('map'),{center:new kakao.maps.LatLng(34.85,126.98),level:11}); map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT); info=new kakao.maps.InfoWindow({removable:false}); drawRegions();}
    function overlay(lat,lng,text,color,cb){const b=document.createElement('button'); b.className='marker-btn'; b.innerHTML=`<div class="marker-bubble" style="background:${color}">${text}</div>`; b.onclick=e=>{e.stopPropagation(); cb();}; return new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(lat,lng),content:b,yAnchor:1});}
    function drawRegions(){regionMarkers.forEach(x=>x.setMap(null)); regionMarkers=[]; Object.entries(REGIONS).forEach(([k,r])=>{const m=overlay(r.lat,r.lng,r.fallback[0].icon,r.color,()=>preview(k)); m.setMap(map); regionMarkers.push(m);});}
    function preview(k){const r=REGIONS[k]; if(!r||!map)return; map.setLevel(9); map.panTo(new kakao.maps.LatLng(r.lat,r.lng)); info.setPosition(new kakao.maps.LatLng(r.lat,r.lng)); info.setContent(`<div style="padding:10px 12px"><strong>${r.label}</strong><div style="font-size:12px;color:#5f6d64">${r.summary}</div></div>`); info.open(map);}
    function drawCourse(){courseMarkers.forEach(x=>x.setMap(null)); courseMarkers=[]; if(courseLine)courseLine.setMap(null); if(!map||!state.course.length)return; const pts=[],bounds=new kakao.maps.LatLngBounds(); state.course.forEach((s,i)=>{const m=overlay(s.lat,s.lng,s.icon,s.color,()=>focusStop(i)); m.setMap(map); courseMarkers.push(m); const p=new kakao.maps.LatLng(s.lat,s.lng); pts.push(p); bounds.extend(p);}); if(pts.length>1){courseLine=new kakao.maps.Polyline({path:pts,strokeWeight:4,strokeColor:'#3d7d55',strokeOpacity:.8,strokeStyle:'shortdash'}); courseLine.setMap(map); map.setBounds(bounds);} else if(pts[0]){map.setLevel(7); map.panTo(pts[0]);}}
    function focusStop(i){const s=state.course[i]; if(!s||!map)return; map.setLevel(7); map.panTo(new kakao.maps.LatLng(s.lat,s.lng)); info.setPosition(new kakao.maps.LatLng(s.lat,s.lng)); info.setContent(`<div style="padding:10px 12px"><strong>${s.title}</strong><div style="font-size:12px;color:#5f6d64">${s.desc}</div></div>`); info.open(map);}
    async function fetchCrowd(date){try{const ym=date.replace(/-/g,'').slice(0,6),data=await json(`https://apis.data.go.kr/B551011/TourismResourceStatsService/getPredictVisitorsInfo?${qs({serviceKey:API_KEY,YM:ym,SIDO:'\uC804\uB77C\uB0A8\uB3C4',MobileOS:'ETC',MobileApp:'EcoTrip',_type:'json',numOfRows:20})}`),items=arr(data?.response?.body?.items?.item),map={}; items.forEach(it=>{const key=Object.entries(REGIONS).find(([,r])=>(it.SIGNGU_NM||'').includes(r.match))?.[0]; if(!key)return; const v=Number(it.PREDICT_CNT||0); map[key]={key,visitors:v,level:v>2000?'high':v>1000?'mid':'low'};}); return Object.keys(REGIONS).map(k=>map[k]||{key:k,visitors:0,level:'low'});}catch{return Object.keys(REGIONS).map(k=>({key:k,visitors:0,level:k==='yeosu'?'high':k==='suncheon'||k==='mokpo'?'mid':'low'}));}}
    function typeCfg(t){return t==='food'?{id:39,icon:'F',color:'#c98d18',rows:6,radius:14000}:t==='stay'?{id:32,icon:'H',color:'#c670a0',rows:6,radius:20000}:{id:12,icon:'P',color:'#3b82f6',rows:10,radius:18000};}
    async function tourismBucket(k,t){const r=REGIONS[k],c=typeCfg(t),data=await json(`https://apis.data.go.kr/B551011/KorService2/locationBasedList2?${qs({serviceKey:API_KEY,MobileOS:'ETC',MobileApp:'EcoTrip',_type:'json',arrange:'Q',contentTypeId:c.id,mapX:r.lng,mapY:r.lat,radius:c.radius,numOfRows:c.rows})}`); return arr(data?.response?.body?.items?.item).map(x=>!x?.title||!x?.mapx||!x?.mapy||t==='spot'&&TOURISM_SKIP_WORDS.some(w=>(x.title||'').includes(w))?null:{type:t,icon:c.icon,color:c.color,title:x.title,time:'',desc:[x.addr1||'place',x.dist?`${(Number(x.dist)/1000).toFixed(1)}km`:'nearby',t==='food'?'meal stop':t==='stay'?'stay option':'tourism spot'].join(' · '),tags:[modeLabel(),t==='food'?'Food':t==='stay'?'Stay':'Spot','TourAPI'],lat:Number(x.mapy),lng:Number(x.mapx)}).filter(Boolean);}
    async function fetchCourse(k){try{const [s,f,h]=await Promise.all([tourismBucket(k,'spot'),tourismBucket(k,'food'),tourismBucket(k,'stay')]); const mix=[s[0],s[1],f[0],s[2],h[0]].filter(Boolean); return (mix.length?mix:REGIONS[k].fallback).map((x,i)=>({...x,time:COURSE_SLOTS[i]||`${String(9+i*2).padStart(2,'0')}:00`}));}catch{return REGIONS[k].fallback;}}
    async function fetchLockers(k){try{const d=await json(`https://apis.data.go.kr/B551982/psl_v2/locker_detail_info_v2?${qs({serviceKey:API_KEY,type:'JSON',numOfRows:30,pageNo:1,stdgCd:REGIONS[k].code})}`),items=arr(d?.body?.item).map(x=>({name:x.stlckNm,addr:x.lclgvNm,kind:x.stlckKndNm||'Locker',note:x.utztnCrgExpln||'Detail only',avail:null,total:null})); return items.length?items:REGIONS[k].lockers;}catch{return REGIONS[k].lockers;}}
    async function fetchDurunubi(k){try{const d=await json(`https://apis.data.go.kr/B551011/Durunubi/courseList?${qs({serviceKey:API_KEY,MobileOS:'ETC',MobileApp:'EcoTrip',_type:'json',numOfRows:60,pageNo:1,crsLevel:state.mode==='walk'?1:''})}`),items=arr(d?.response?.body?.items?.item),hit=items.filter(x=>REGIONS[k].hints.some(h=>`${x.crsKorNm||''} ${x.crsContents||''}`.includes(h))); return (hit.length?hit:items).slice(0,3).map(x=>({title:x.crsKorNm,distance:`${x.crsDstnc||'-'}km`,time:x.crsTotlRqrmHour?`${Math.round(Number(x.crsTotlRqrmHour)/60)}h`:'time n/a',level:x.crsLevel||'-',cycle:x.crsCycle||'course',summary:(x.crsContents||'').split('<br>').join(' ').slice(0,140)}));}catch{return [];}}
    async function fetchBus(k){try{const [mst,loc]=await Promise.all([json(`http://apis.data.go.kr/B551982/rte/mst_info?${qs({serviceKey:BUS_KEY,stdgCd:REGIONS[k].code,pageNo:1,numOfRows:300})}`),json(`http://apis.data.go.kr/B551982/rte/rtm_loc_info?${qs({serviceKey:BUS_KEY,stdgCd:REGIONS[k].code,pageNo:1,numOfRows:400})}`)]),routes=arr(mst?.body?.items?.item),live=arr(loc?.body?.items?.item),cnt={}; live.forEach(x=>cnt[x.rteId]=(cnt[x.rteId]||0)+1); return routes.map(x=>({routeNo:x.rteNo||'Route',start:x.stpnt||'-',end:x.edpnt||'-',vehicles:cnt[x.rteId]||0})).sort((a,b)=>b.vehicles-a.vehicles).slice(0,3);}catch{return [];}}
    function lockersum(k){return state.lockers.reduce((a,x)=>(a.locations++,a.avail+=Number(x.avail||0),a.total+=Number(x.total||0),a),{locations:0,avail:0,total:0});}
    function bestRegion(){return [...state.crowd].sort((a,b)=>a.visitors-b.visitors)[0]?.key||'damyang';}
    function renderSum(){const r=REGIONS[state.regionKey||bestRegion()],c=state.crowd.find(x=>x.key===(state.regionKey||bestRegion()))||{level:'low',visitors:0},s=state.course.length?courseStats(state.course):{distance:'0.0',time:'0h'},l=lockersum(state.regionKey); $('sum').innerHTML=`<div class="box"><div class="val">${r.label}</div><div class="lbl">${r.summary}</div></div><div class="box"><div class="val">${crowdLabel(c.level)}</div><div class="lbl">${c.visitors.toLocaleString()} visitors</div></div><div class="box"><div class="val">${s.distance}km</div><div class="lbl">${s.time}</div></div><div class="box"><div class="val">${l.locations}</div><div class="lbl">${l.total?`${l.avail}/${l.total} cells`:'locker spots'}</div></div>`;}
    function renderCourseTab(){if(!state.course.length)return `<div class="empty">Run a search to build a route.</div>`; const s=courseStats(state.course),crowd=state.crowd.find(x=>x.key===state.regionKey)||{level:'low'},l=lockersum(state.regionKey); return `<div class="list"><div class="item"><div class="row"><strong>${REGIONS[state.regionKey].label} eco route</strong><span class="chip">${modeLabel()} · ${crowdLabel(crowd.level)}</span></div><div class="chips"><span class="chip">${s.distance}km</span><span class="chip">${s.time}</span><span class="chip">${l.total?`${l.avail}/${l.total} locker cells`:`${l.locations} locker spots`}</span></div></div>${state.course.map((x,i)=>`<div class="item course" onclick="focusStop(${i})"><div class="row"><div style="display:flex;gap:10px"><div class="badge" style="background:${x.color}">${x.icon}</div><div><h3>${x.time} · ${x.title}</h3><div class="muted">${x.desc}</div></div></div><span class="chip">${i?`+${minutes(state.course[i-1],x)}m`:'Start'}</span></div><div class="chips">${x.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div></div>`).join('')}<div class="item"><strong>Durunubi</strong><div class="list" style="margin-top:8px">${(state.durunubi.length?state.durunubi:[{title:'No strong local match yet',distance:'-',time:'-',level:'-',cycle:'-',summary:'Durunubi API is connected. This region does not yet return a clear keyword match.'}]).map(x=>`<div class="item"><h3>${x.title}</h3><div class="muted">${x.summary}</div><div class="chips"><span class="chip">${x.distance}</span><span class="chip">${x.time}</span><span class="chip">Level ${x.level}</span><span class="chip">${x.cycle}</span></div></div>`).join('')}</div></div><div class="item"><strong>Realtime bus</strong><div class="list" style="margin-top:8px">${(state.bus.length?state.bus:[{routeNo:'-',start:'No live bus data',end:'for this region',vehicles:0}]).map(x=>`<div class="item"><div class="row"><div><h3>Route ${x.routeNo}</h3><div class="muted">${x.start} → ${x.end}</div></div><span class="chip">${x.vehicles} vehicles</span></div></div>`).join('')}</div></div></div>`;}
    function renderCrowdTab(){return `<div class="list">${[...state.crowd].sort((a,b)=>a.visitors-b.visitors).map(x=>`<div class="item"><div class="row"><div><h3>${REGIONS[x.key].label}</h3><div class="muted">${REGIONS[x.key].summary}</div></div><span class="chip">${crowdLabel(x.level)}</span></div><div class="chips"><span class="chip">${x.visitors.toLocaleString()} visitors</span><button class="tab" onclick="jumpRegion('${x.key}')">Use region</button></div></div>`).join('')}</div>`;}
    function renderLockerTab(){if(!state.lockers.length)return `<div class="empty">No locker data.</div>`; return `<div class="list">${state.lockers.map(x=>`<div class="item"><h3>${x.name}</h3><div class="muted">${x.addr}</div><div class="chips"><span class="chip">${x.kind||'Locker'}</span><span class="chip">${x.total?`${x.avail}/${x.total} available`:x.note||'detail only'}</span></div></div>`).join('')}</div>`;}
    function render(){renderSum(); $('content').innerHTML=state.tab==='crowd'?renderCrowdTab():state.tab==='locker'?renderLockerTab():renderCourseTab();}
    async function jumpRegion(k){state.regionKey=k; $('region').value=k; state.course=await fetchCourse(k); state.lockers=await fetchLockers(k); state.durunubi=await fetchDurunubi(k); state.bus=await fetchBus(k); render(); drawCourse(); preview(k);}
    async function run(){const d=$('date').value; if(!d)return toast('Choose a date first'); state.date=d; state.mode=$('mode').value; const b=$('run'); b.disabled=true; b.textContent='Loading'; state.crowd=await fetchCrowd(d); state.regionKey=$('region').value||bestRegion(); await jumpRegion(state.regionKey); b.disabled=false; b.textContent='Build eco route'; toast('Live APIs refreshed');}
    document.addEventListener('DOMContentLoaded',()=>{$('date').value=new Date().toISOString().slice(0,10); $('run').onclick=run; document.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=()=>{state.tab=btn.dataset.tab; document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('on',x.dataset.tab===state.tab)); render();}); if(window.kakao&&window.kakao.maps&&typeof window.kakao.maps.load==='function')window.kakao.maps.load(initMap); else initMap(); render();});
  </script>
</body>
</html>
